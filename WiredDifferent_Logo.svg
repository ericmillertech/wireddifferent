<svg width="320" height="60" viewBox="0 0 320 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#70B7FF"/>
      <stop offset="100%" stop-color="#38d9ff"/>
    </linearGradient>
  </defs>

  <!-- Brain circle -->
  <circle cx="30" cy="30" r="24" fill="rgba(112,183,255,0.08)" stroke="rgba(112,183,255,0.2)" stroke-width="1"/>

  <!-- Brain shape — angular cyberpunk -->
  <g transform="translate(30,29)">
    <path d="M0,-16 L-3,-19 L-11,-17 L-15,-9 L-15,0 L-12,7 L-15,12 L-11,16 L-4,18 L0,15 C0,15 4,18 11,16 L15,12 L12,7 L15,0 L15,-9 L11,-17 L3,-19 Z"
      fill="rgba(112,183,255,0.1)" stroke="url(#brainGrad)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M-12,-4 L-8,-8 L-5,-5 L-4,-1" stroke="#70B7FF" stroke-width="1.5" fill="none" stroke-linecap="square"/>
    <path d="M-12,5 L-8,1 L-5,4 L-4,8" stroke="#70B7FF" stroke-width="1.5" fill="none" stroke-linecap="square" opacity="0.6"/>
    <path d="M12,-4 L8,-8 L5,-5 L4,-1" stroke="#38d9ff" stroke-width="1.5" fill="none" stroke-linecap="square"/>
    <path d="M12,5 L8,1 L5,4 L4,8" stroke="#38d9ff" stroke-width="1.5" fill="none" stroke-linecap="square" opacity="0.6"/>
    <!-- Circuit wire -->
    <path d="M15,0 L22,0 L25,-5 L28,0 L36,0" stroke="#FFF275" stroke-width="2" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
    <circle cx="36" cy="0" r="3.5" fill="#FFF275"/>
    <circle cx="36" cy="0" r="1.5" fill="#1C2636"/>
  </g>

  <!-- Divider -->
  <line x1="70" y1="12" x2="70" y2="48" stroke="rgba(112,183,255,0.2)" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="82" y="34" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="26" font-style="italic" letter-spacing="-0.5">
    <tspan fill="#F0F4FF">WIRED</tspan><tspan fill="#70B7FF">Different</tspan>
  </text>

  <!-- Tagline -->
  <text x="82" y="50" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#747474" letter-spacing="2">FIELD NOTES FOR ADHD BRAINS</text>
</svg>
