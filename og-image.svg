<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#1C2636"/>

  <g transform="translate(60,285) scale(2)">
    <!-- Brain circle -->
    <circle cx="30" cy="30" r="24" fill="rgba(37,99,235,0.12)" stroke="rgba(37,99,235,0.35)" stroke-width="1"/>

    <!-- Brain shape — angular cyberpunk -->
    <g transform="translate(30,29)">
      <path d="M0,-16 L-3,-19 L-11,-17 L-15,-9 L-15,0 L-12,7 L-15,12 L-11,16 L-4,18 L0,15 C0,15 4,18 11,16 L15,12 L12,7 L15,0 L15,-9 L11,-17 L3,-19 Z"
        fill="rgba(37,99,235,0.12)" stroke="url(#brainGrad)" stroke-width="2" stroke-linejoin="round"/>
      <path d="M-12,-4 L-8,-8 L-5,-5 L-4,-1" stroke="#2563eb" stroke-width="1.5" fill="none" stroke-linecap="square"/>
      <path d="M-12,5 L-8,1 L-5,4 L-4,8" stroke="#2563eb" stroke-width="1.5" fill="none" stroke-linecap="square" opacity="0.5"/>
      <path d="M12,-4 L8,-8 L5,-5 L4,-1" stroke="#d97706" stroke-width="1.5" fill="none" stroke-linecap="square"/>
      <path d="M12,5 L8,1 L5,4 L4,8" stroke="#d97706" stroke-width="1.5" fill="none" stroke-linecap="square" opacity="0.5"/>
      <!-- Circuit wire -->
      <path d="M15,0 L22,0 L25,-5 L28,0 L36,0" stroke="#d97706" stroke-width="2" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
      <circle cx="36" cy="0" r="3.5" fill="#d97706"/>
      <circle cx="36" cy="0" r="1.5" fill="#f6f8fc"/>
    </g>

    <!-- Divider -->
    <line x1="70" y1="12" x2="70" y2="48" stroke="rgba(37,99,235,0.3)" stroke-width="1"/>

    <!-- Wordmark -->
    <text x="82" y="34" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="26" font-style="italic" letter-spacing="-0.5">
      <tspan fill="#d97706">WIRED</tspan><tspan fill="#2563eb">Different</tspan>
    </text>

    <!-- Tagline -->
    <text x="82" y="50" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#9aa7ba" letter-spacing="2">FIELD NOTES FOR ADHD BRAINS</text>
  </g>
